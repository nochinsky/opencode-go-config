name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: A brief description of the bug
      placeholder: e.g., "Bug in model routing logic"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the bug
      placeholder: Describe what happened
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce this bug
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
      placeholder: 
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens
      placeholder: 
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and OpenCode version
      placeholder: "OS: Windows 11, OpenCode: v1.x.x"
    validations:
      required: true
